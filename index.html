<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <title>StudyCouple Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --bg: #0a0a0f;
      --bg-card: rgba(255,255,255,0.05);
      --violet: #8b5cf6;
      --pink: #ec4899;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --white: #ffffff;
      --white-60: rgba(255,255,255,0.6);
      --white-40: rgba(255,255,255,0.4);
      --border: rgba(255,255,255,0.1);
    }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* Background */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--violet); top: -200px; left: -200px; }
    .orb-2 { width: 400px; height: 400px; background: var(--pink); bottom: -150px; right: -150px; }
    
    /* Layout */
    .app { position: relative; z-index: 1; max-width: 500px; margin: 0 auto; min-height: 100vh; }
    .content { padding: 80px 16px 100px; }
    
    /* Glass Card */
    .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      margin-bottom: 16px;
      overflow: hidden;
      animation: fadeIn 0.5s ease-out;
    }
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px -10px rgba(139,92,246,0.3);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Typography */
    .text-gradient {
      background: linear-gradient(135deg, #a78bfa 0%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--violet) 0%, #7c3aed 100%);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(139,92,246,0.5); }
    .btn-gleici {
      background: linear-gradient(135deg, var(--pink) 0%, #db2777 100%);
      color: white;
    }
    .btn-gleici:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(236,72,153,0.5); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: white;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.05); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* Inputs */
    .input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: white;
      font-size: 14px;
      transition: all 0.3s;
    }
    .input:focus { outline: none; border-color: var(--violet); box-shadow: 0 0 0 3px rgba(139,92,246,0.2); }
    .input::placeholder { color: var(--white-40); }
    textarea.input { resize: none; min-height: 80px; }
    
    /* User Selection */
    .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .user-btn {
      padding: 20px 16px;
      border-radius: 16px;
      border: 2px solid var(--border);
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }
    .user-btn:hover { background: rgba(255,255,255,0.08); }
    .user-btn.selected.manasses { border-color: var(--violet); background: rgba(139,92,246,0.15); }
    .user-btn.selected.gleici { border-color: var(--pink); background: rgba(236,72,153,0.15); }
    .user-btn .emoji { font-size: 40px; margin-bottom: 8px; display: block; }
    .user-btn .name { font-weight: 600; color: white; }
    .user-btn .profile { font-size: 11px; color: var(--white-40); margin-top: 4px; }
    
    /* Stats */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-card { padding: 20px; }
    .stat-value { font-size: 28px; font-weight: 700; color: white; }
    .stat-label { font-size: 11px; color: var(--white-60); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    
    /* Progress Ring */
    .progress-ring { position: relative; width: 120px; height: 120px; }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring circle { fill: none; stroke-width: 8; }
    .progress-ring .bg { stroke: rgba(255,255,255,0.1); }
    .progress-ring .progress { stroke-linecap: round; transition: stroke-dashoffset 1.5s ease-out; }
    .progress-ring .value {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      font-weight: 700;
    }
    
    /* Progress Bar */
    .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease-out; }
    
    /* Difficulty Buttons */
    .diff-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .diff-btn {
      padding: 12px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--white-60);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .diff-btn.active.facil { border-color: var(--green); background: rgba(34,197,94,0.15); color: var(--green); }
    .diff-btn.active.medio { border-color: var(--yellow); background: rgba(234,179,8,0.15); color: var(--yellow); }
    .diff-btn.active.dificil { border-color: var(--red); background: rgba(239,68,68,0.15); color: var(--red); }
    
    /* Timer */
    .timer-display {
      font-family: 'SF Mono', monospace;
      font-size: 48px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 2px;
      color: var(--violet);
      text-shadow: 0 0 20px rgba(139,92,246,0.5);
    }
    .timer-display.paused { color: var(--white-40); text-shadow: none; }
    
    /* Navigation */
    .nav-bottom {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 500px;
      background: linear-gradient(to top, rgba(10,10,15,0.98), rgba(10,10,15,0.9));
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-items { display: flex; justify-content: space-around; }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      border-radius: 12px;
      color: var(--white-40);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 10px;
      transition: all 0.3s;
    }
    .nav-item:hover { color: white; }
    .nav-item.active.manasses { color: var(--violet); background: rgba(139,92,246,0.15); }
    .nav-item.active.gleici { color: var(--pink); background: rgba(236,72,153,0.15); }
    .nav-item svg { width: 20px; height: 20px; }
    
    /* Top Bar */
    .top-bar {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 500px;
      background: linear-gradient(to bottom, rgba(10,10,15,0.98), rgba(10,10,15,0.9));
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-bar .logo { font-size: 20px; font-weight: 700; }
    .top-bar .actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      position: relative;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.1); }
    .icon-btn svg { width: 18px; height: 18px; }
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 9px;
      background: var(--red);
      color: white;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      font-size: 13px;
      color: white;
      transition: all 0.3s;
    }
    .user-chip.manasses { background: rgba(139,92,246,0.2); border: 1px solid rgba(139,92,246,0.3); }
    .user-chip.gleici { background: rgba(236,72,153,0.2); border: 1px solid rgba(236,72,153,0.3); }
    
    /* Notification Panel */
    .notif-panel {
      position: fixed;
      top: 70px;
      right: 16px;
      width: 320px;
      max-height: 400px;
      z-index: 200;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .notif-item {
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      margin-bottom: 8px;
    }
    .notif-item .time { font-size: 11px; color: var(--white-40); margin-bottom: 4px; }
    .notif-item .msg { font-size: 13px; color: var(--white-60); }
    
    /* Week Chart */
    .week-chart { display: flex; align-items: flex-end; justify-content: space-between; height: 100px; gap: 8px; }
    .week-bar { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .week-bar .bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      transition: height 0.6s ease-out;
      min-height: 4px;
    }
    .week-bar .bar.has-data { background: linear-gradient(to top, var(--violet), #a78bfa); }
    .week-bar .bar.no-data { background: rgba(255,255,255,0.1); }
    .week-bar .label { font-size: 10px; color: var(--white-40); }
    
    /* Comparison Bar */
    .compare-bar { margin-bottom: 16px; }
    .compare-bar .header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; }
    .compare-bar .labels { display: flex; gap: 12px; margin-top: 4px; }
    .compare-bar .label { display: flex; align-items: center; gap: 6px; font-size: 11px; }
    .compare-bar .dot { width: 8px; height: 8px; border-radius: 50%; }
    
    /* Subject List */
    .subject-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      margin-bottom: 8px;
    }
    .subject-item .name { flex: 1; font-size: 13px; }
    .subject-item .bar-container { flex: 2; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .subject-item .bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease-out; }
    .subject-item .value { width: 40px; text-align: right; font-size: 12px; font-weight: 600; }
    
    /* Confetti */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 9999;
      animation: confetti-fall 2s ease-out forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    
    /* Utility */
    .p-4 { padding: 16px; }
    .p-5 { padding: 20px; }
    .p-6 { padding: 24px; }
    .mb-1 { margin-bottom: 4px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mt-4 { margin-top: 16px; }
    .flex { display: flex; }
    .flex-1 { flex: 1; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .text-center { text-align: center; }
    .text-right { text-align: right; }
    .text-xs { font-size: 11px; }
    .text-sm { font-size: 13px; }
    .text-lg { font-size: 18px; }
    .text-xl { font-size: 20px; }
    .text-2xl { font-size: 24px; }
    .text-3xl { font-size: 30px; }
    .text-4xl { font-size: 36px; }
    .text-5xl { font-size: 48px; }
    .font-bold { font-weight: 700; }
    .font-semibold { font-weight: 600; }
    .font-medium { font-weight: 500; }
    .text-white { color: white; }
    .text-white-60 { color: var(--white-60); }
    .text-white-40 { color: var(--white-40); }
    .text-violet { color: var(--violet); }
    .text-pink { color: var(--pink); }
    .text-green { color: var(--green); }
    .text-yellow { color: var(--yellow); }
    .text-red { color: var(--red); }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .w-full { width: 100%; }
    .w-12 { width: 48px; }
    .w-14 { width: 56px; }
    .h-14 { height: 56px; }
    .h-2 { height: 8px; }
    .rounded-xl { border-radius: 12px; }
    .rounded-2xl { border-radius: 16px; }
    .rounded-full { border-radius: 50%; }
    .hidden { display: none; }
    .grid { display: grid; }
    .grid-cols-2 { grid-template-columns: 1fr 1fr; }
    .grid-cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    
    /* Login */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box { width: 100%; max-width: 400px; }
    .logo-box {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--violet) 0%, #7c3aed 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 20px;
      box-shadow: 0 10px 40px -10px rgba(139,92,246,0.5);
    }
    
    /* Hero Card */
    .hero-card {
      padding: 24px;
      border-radius: 24px;
      margin-bottom: 20px;
    }
    .hero-card.manasses {
      background: linear-gradient(135deg, rgba(139,92,246,0.3) 0%, rgba(124,58,237,0.2) 50%, rgba(59,130,246,0.2) 100%);
    }
    .hero-card.gleici {
      background: linear-gradient(135deg, rgba(236,72,153,0.3) 0%, rgba(219,39,119,0.2) 50%, rgba(249,115,22,0.2) 100%);
    }
    
    /* Tag */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      font-size: 12px;
      color: var(--white-60);
    }
    
    /* Streak */
    .streak-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .streak-icon.gold { background: linear-gradient(135deg, #eab308 0%, #f97316 100%); }
    .streak-icon.orange { background: linear-gradient(135deg, #f97316 0%, #ef4444 100%); }
    .streak-icon.green { background: linear-gradient(135deg, #22c55e 0%, #10b981 100%); }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    
    /* Selection */
    ::selection { background: rgba(139,92,246,0.3); color: white; }
  </style>
</head>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
  </div>
  
  <div id="app" class="app"></div>
