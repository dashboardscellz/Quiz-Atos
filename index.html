<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="Mana e Kelinha - Sistema de estudos gamificado para casais">
  <title>Mana e Kelinha 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       MANA E KELINHA - CSS COMPLETO
       Design System: Glassmorphism + Dark Theme
       ============================================ */
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --bg: #0a0a0f;
      --bg-card: rgba(255,255,255,0.05);
      --violet: #8b5cf6;
      --pink: #ec4899;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --orange: #f97316;
      --cyan: #06b6d4;
      --purple: #a855f7;
      --white: #ffffff;
      --white-80: rgba(255,255,255,0.8);
      --white-60: rgba(255,255,255,0.6);
      --white-40: rgba(255,255,255,0.4);
      --white-20: rgba(255,255,255,0.2);
      --white-10: rgba(255,255,255,0.1);
      --white-05: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      
      /* Sombras */
      --shadow-violet: 0 10px 40px -10px rgba(139,92,246,0.4);
      --shadow-pink: 0 10px 40px -10px rgba(236,72,153,0.4);
      --shadow-green: 0 10px 40px -10px rgba(34,197,94,0.4);
      --shadow-gold: 0 10px 40px -10px rgba(234,179,8,0.4);
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
    }
    
    /* ============================================
       BACKGROUND ANIMADO
       ============================================ */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
      animation: float 20s ease-in-out infinite;
    }
    .orb-1 { 
      width: 600px; height: 600px; 
      background: var(--violet); 
      top: -250px; left: -200px; 
      animation-delay: 0s;
    }
    .orb-2 { 
      width: 500px; height: 500px; 
      background: var(--pink); 
      bottom: -200px; right: -150px; 
      animation-delay: -10s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }
    
    /* ============================================
       LAYOUT RESPONSIVO
       ============================================ */
    .app { 
      position: relative; 
      z-index: 1; 
      max-width: 500px; 
      margin: 0 auto; 
      min-height: 100vh; 
    }
    .content { padding: 80px 16px 100px; }
    
    /* ============================================
       COMPONENTES UI - GLASS CARDS
       ============================================ */
    .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      margin-bottom: 16px;
      overflow: hidden;
      animation: fadeIn 0.4s ease-out;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card-hover:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-violet);
    }
    .card-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-body { padding: 20px; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px currentColor; }
      50% { box-shadow: 0 0 20px currentColor, 0 0 30px currentColor; }
    }
    
    /* ============================================
       TIPOGRAFIA
       ============================================ */
    .text-gradient {
      background: linear-gradient(135deg, #a78bfa 0%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .text-gradient-green {
      background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .text-gradient-gold {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 0%, #d97706 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* ============================================
       BOTÕES
       ============================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .btn:hover::before { left: 100%; }
    .btn:active { transform: scale(0.98); }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--violet) 0%, #7c3aed 100%);
      color: white;
    }
    .btn-primary:hover { 
      transform: translateY(-2px); 
      box-shadow: var(--shadow-violet); 
    }
    .btn-gleici {
      background: linear-gradient(135deg, var(--pink) 0%, #db2777 100%);
      color: white;
    }
    .btn-gleici:hover { 
      transform: translateY(-2px); 
      box-shadow: var(--shadow-pink); 
    }
    .btn-success {
      background: linear-gradient(135deg, var(--green) 0%, #16a34a 100%);
      color: white;
    }
    .btn-success:hover { 
      transform: translateY(-2px); 
      box-shadow: var(--shadow-green); 
    }
    .btn-gold {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      color: #1a1a1a;
    }
    .btn-gold:hover { 
      transform: translateY(-2px); 
      box-shadow: var(--shadow-gold); 
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: white;
    }
    .btn-outline:hover { background: var(--white-05); }
    .btn-danger {
      background: linear-gradient(135deg, var(--red) 0%, #dc2626 100%);
      color: white;
    }
    .btn-sm {
      padding: 8px 16px;
      font-size: 12px;
    }
    .btn-icon {
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 10px;
    }
    .btn:disabled { 
      opacity: 0.5; 
      cursor: not-allowed;
      transform: none !important;
    }
    
    /* ============================================
       INPUTS E FORMULÁRIOS
       ============================================ */
    .input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--white-05);
      border: 1px solid var(--border);
      color: white;
      font-size: 14px;
      transition: all 0.3s;
      font-family: inherit;
    }
    .input:focus { 
      outline: none; 
      border-color: var(--violet); 
      box-shadow: 0 0 0 3px rgba(139,92,246,0.2); 
    }
    .input::placeholder { color: var(--white-40); }
    textarea.input { resize: none; min-height: 80px; }
    .input-group {
      display: flex;
      gap: 12px;
    }
    .input-group .input { flex: 1; }
    
    .form-label {
      display: block;
      font-size: 13px;
      color: var(--white-60);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-label .optional {
      color: var(--white-40);
      font-weight: 400;
    }
    
    /* ============================================
       SELEÇÃO DE USUÁRIO (LOGIN)
       ============================================ */
    .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .user-btn {
      padding: 24px 16px;
      border-radius: 16px;
      border: 2px solid var(--border);
      background: var(--white-05);
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }
    .user-btn:hover { 
      background: var(--white-10); 
      transform: translateY(-2px);
    }
    .user-btn.selected.mana { 
      border-color: var(--violet); 
      background: rgba(139,92,246,0.15); 
    }
    .user-btn.selected.kelinha { 
      border-color: var(--pink); 
      background: rgba(236,72,153,0.15); 
    }
    .user-btn .emoji { font-size: 44px; margin-bottom: 10px; display: block; }
    .user-btn .name { font-weight: 600; color: white; font-size: 16px; }
    .user-btn .profile { font-size: 12px; color: var(--white-40); margin-top: 4px; }
    
    /* ============================================
       ESTATÍSTICAS
       ============================================ */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-card { padding: 20px; }
    .stat-value { 
      font-size: 28px; 
      font-weight: 700; 
      color: white;
      line-height: 1.2;
    }
    .stat-label { 
      font-size: 11px; 
      color: var(--white-60); 
      text-transform: uppercase; 
      letter-spacing: 0.5px; 
      margin-top: 4px; 
    }
    .stat-change {
      font-size: 11px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat-change.positive { color: var(--green); }
    .stat-change.negative { color: var(--red); }
    
    /* ============================================
       PROGRESS RING
       ============================================ */
    .progress-ring { position: relative; width: 120px; height: 120px; }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring circle { fill: none; stroke-width: 8; }
    .progress-ring .bg { stroke: var(--white-10); }
    .progress-ring .progress { 
      stroke-linecap: round; 
      transition: stroke-dashoffset 1.5s ease-out; 
    }
    .progress-ring .value {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      font-weight: 700;
    }
    
    /* ============================================
       PROGRESS BAR
       ============================================ */
    .progress-bar { 
      height: 8px; 
      background: var(--white-10); 
      border-radius: 4px; 
      overflow: hidden; 
    }
    .progress-bar-fill { 
      height: 100%; 
      border-radius: 4px; 
      transition: width 1s ease-out; 
    }
    
    /* ============================================
       DIFICULDADE
       ============================================ */
    .diff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .diff-btn {
      padding: 14px 8px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--white-05);
      color: var(--white-60);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .diff-btn:hover { background: var(--white-10); }
    .diff-btn.active.facil { 
      border-color: var(--green); 
      background: rgba(34,197,94,0.15); 
      color: var(--green); 
    }
    .diff-btn.active.medio { 
      border-color: var(--yellow); 
      background: rgba(234,179,8,0.15); 
      color: var(--yellow); 
    }
    .diff-btn.active.dificil { 
      border-color: var(--red); 
      background: rgba(239,68,68,0.15); 
      color: var(--red); 
    }
    
    /* ============================================
       CRONÔMETRO
       ============================================ */
    .timer-display {
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 52px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 4px;
      color: var(--violet);
      text-shadow: 0 0 30px rgba(139,92,246,0.5);
      line-height: 1;
    }
    .timer-display.paused { 
      color: var(--white-40); 
      text-shadow: none; 
    }
    .timer-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .timer-status.running {
      background: rgba(34,197,94,0.2);
      color: var(--green);
    }
    .timer-status.paused {
      background: var(--white-10);
      color: var(--white-60);
    }
    
    /* ============================================
       NAVEGAÇÃO MOBILE
       ============================================ */
    .nav-bottom {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 500px;
      background: linear-gradient(to top, rgba(10,10,15,0.98), rgba(10,10,15,0.9));
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-items { display: flex; justify-content: space-around; }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 10px;
      border-radius: 12px;
      color: var(--white-40);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 10px;
      transition: all 0.3s;
      flex: 1;
    }
    .nav-item:hover { color: white; }
    .nav-item.active.mana { 
      color: var(--violet); 
      background: rgba(139,92,246,0.15); 
    }
    .nav-item.active.kelinha { 
      color: var(--pink); 
      background: rgba(236,72,153,0.15); 
    }
    .nav-item svg { width: 20px; height: 20px; }
    
    /* ============================================
       TOP BAR MOBILE
       ============================================ */
    .top-bar {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 500px;
      background: linear-gradient(to bottom, rgba(10,10,15,0.98), rgba(10,10,15,0.9));
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-bar .logo { font-size: 20px; font-weight: 700; }
    .top-bar .actions { display: flex; gap: 8px; align-items: center; }
    
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--white-05);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      position: relative;
    }
    .icon-btn:hover { background: var(--white-10); }
    .icon-btn svg { width: 18px; height: 18px; }
    
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 9px;
      background: var(--red);
      color: white;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .user-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      font-size: 13px;
      color: white;
      transition: all 0.3s;
    }
    .user-chip.mana { 
      background: rgba(139,92,246,0.2); 
      border: 1px solid rgba(139,92,246,0.3); 
    }
    .user-chip.kelinha { 
      background: rgba(236,72,153,0.2); 
      border: 1px solid rgba(236,72,153,0.3); 
    }
    
    /* ============================================
       PAINEL DE NOTIFICAÇÕES
       ============================================ */
    .notif-panel {
      position: fixed;
      top: 70px;
      right: 16px;
      width: 320px;
      max-height: 400px;
      z-index: 200;
      animation: slideIn 0.3s ease-out;
    }
    .notif-item {
      padding: 14px;
      border-radius: 12px;
      background: var(--white-05);
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }
    .notif-item .time { 
      font-size: 11px; 
      color: var(--white-40); 
      margin-bottom: 4px; 
    }
    .notif-item .msg { font-size: 13px; color: var(--white-80); }
    
    /* ============================================
       GRÁFICO SEMANAL
       ============================================ */
    .week-chart { 
      display: flex; 
      align-items: flex-end; 
      justify-content: space-between; 
      height: 100px; 
      gap: 8px; 
    }
    .week-bar { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 8px; 
    }
    .week-bar .bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      transition: height 0.6s ease-out;
      min-height: 4px;
    }
    .week-bar .bar.has-data { 
      background: linear-gradient(to top, var(--violet), #a78bfa); 
    }
    .week-bar .bar.no-data { background: var(--white-10); }
    .week-bar .label { font-size: 10px; color: var(--white-40); }
    
    /* ============================================
       LISTA DE MATÉRIAS
       ============================================ */
    .subject-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 12px;
      background: var(--white-05);
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }
    .subject-item .name { flex: 1; font-size: 14px; }
    .subject-item .bar-container { 
      flex: 2; 
      height: 6px; 
      background: var(--white-10); 
      border-radius: 3px; 
      overflow: hidden; 
    }
    .subject-item .bar-fill { 
      height: 100%; 
      border-radius: 3px; 
      transition: width 0.8s ease-out; 
    }
    .subject-item .value { 
      width: 45px; 
      text-align: right; 
      font-size: 12px; 
      font-weight: 600; 
    }
    
    /* ============================================
       HERO CARD
       ============================================ */
    .hero-card {
      padding: 28px;
      border-radius: 24px;
      margin-bottom: 20px;
    }
    .hero-card.mana {
      background: linear-gradient(135deg, rgba(139,92,246,0.3) 0%, rgba(124,58,237,0.2) 50%, rgba(59,130,246,0.2) 100%);
    }
    .hero-card.kelinha {
      background: linear-gradient(135deg, rgba(236,72,153,0.3) 0%, rgba(219,39,119,0.2) 50%, rgba(249,115,22,0.2) 100%);
    }
    
    /* ============================================
       TAGS
       ============================================ */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      background: var(--white-10);
      font-size: 12px;
      color: var(--white-60);
    }
    .tag-primary {
      background: rgba(139,92,246,0.2);
      color: var(--violet);
    }
    .tag-gold {
      background: rgba(251,191,36,0.2);
      color: #fbbf24;
    }
    .tag-green {
      background: rgba(34,197,94,0.2);
      color: var(--green);
    }
    
    /* ============================================
       STREAK
       ============================================ */
    .streak-icon {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .streak-icon.gold { 
      background: linear-gradient(135deg, #eab308 0%, #f97316 100%); 
    }
    .streak-icon.orange { 
      background: linear-gradient(135deg, #f97316 0%, #ef4444 100%); 
    }
    .streak-icon.green { 
      background: linear-gradient(135deg, #22c55e 0%, #10b981 100%); 
    }
    
    /* ============================================
       MODAL
       ============================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s;
    }
    .modal-content {
      width: 100%;
      max-width: 450px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideIn 0.3s;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h3 {
      font-size: 18px;
      font-weight: 600;
    }
    .modal-body { padding: 20px; }
    
    /* ============================================
       LISTA DE SESSÕES (HISTÓRICO)
       ============================================ */
    .session-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .session-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border-radius: 14px;
      background: var(--white-05);
      border: 1px solid var(--border);
      transition: all 0.3s;
    }
    .session-item:hover {
      background: var(--white-10);
      border-color: var(--white-20);
    }
    .session-item .icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .session-item .icon.facil { background: rgba(34,197,94,0.2); }
    .session-item .icon.medio { background: rgba(234,179,8,0.2); }
    .session-item .icon.dificil { background: rgba(239,68,68,0.2); }
    .session-item .content { flex: 1; min-width: 0; }
    .session-item .subject {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-item .meta {
      font-size: 12px;
      color: var(--white-60);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .session-item .meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .session-item .actions {
      display: flex;
      gap: 6px;
    }
    .session-item .action-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: none;
      background: var(--white-10);
      color: var(--white-60);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .session-item .action-btn:hover {
      background: var(--white-20);
      color: white;
    }
    .session-item .action-btn.delete:hover {
      background: rgba(239,68,68,0.2);
      color: var(--red);
    }
    
    /* ============================================
       METAS
       ============================================ */
    .goal-card {
      padding: 20px;
      border-radius: 16px;
      background: var(--white-05);
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .goal-card .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .goal-card .title {
      font-weight: 600;
      font-size: 15px;
    }
    .goal-card .subtitle {
      font-size: 12px;
      color: var(--white-60);
      margin-top: 2px;
    }
    .goal-card .progress-text {
      font-size: 18px;
      font-weight: 700;
    }
    .goal-card .progress-bar {
      height: 10px;
      margin-top: 8px;
    }
    
    /* ============================================
       FILTROS
       ============================================ */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--white-05);
      color: var(--white-60);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .filter-btn:hover { background: var(--white-10); }
    .filter-btn.active {
      background: var(--violet);
      border-color: var(--violet);
      color: white;
    }
    
    /* ============================================
       CONFETTI
       ============================================ */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 9999;
      animation: confetti-fall 2.5s ease-out forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    
    /* ============================================
       TOAST NOTIFICATIONS
       ============================================ */
    .toast-container {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 400;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 90%;
      max-width: 400px;
    }
    .toast {
      padding: 14px 18px;
      border-radius: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.3s;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); }
    .toast.info { border-color: var(--violet); }
    .toast.warning { border-color: var(--yellow); }
    .toast.xp { border-color: var(--yellow); background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(245,158,11,0.05)); }
    .toast.badge { border-color: var(--violet); background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(124,58,237,0.05)); }
    .toast-icon { font-size: 20px; }
    .toast-message { flex: 1; font-size: 14px; }
    .toast-xp { font-size: 12px; color: var(--yellow); font-weight: 600; }
    
    /* ============================================
       EXPORT/IMPORT
       ============================================ */
    .export-section {
      padding: 20px;
    }
    .export-btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }
    
    /* ============================================
       EMPTY STATE
       ============================================ */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
    }
    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .empty-state h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .empty-state p {
      color: var(--white-60);
      font-size: 14px;
    }
    
    /* ============================================
       LOGIN
       ============================================ */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box { width: 100%; max-width: 400px; }
    .logo-box {
      width: 90px;
      height: 90px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--violet) 0%, var(--pink) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 45px;
      margin: 0 auto 24px;
      box-shadow: 0 10px 40px -10px rgba(139,92,246,0.5);
      animation: pulse 2s ease-in-out infinite;
    }
    
    /* ============================================
       SISTEMA DE BADGES
       ============================================ */
    .badge-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .badge-item {
      padding: 16px 12px;
      border-radius: 16px;
      background: var(--white-05);
      border: 1px solid var(--border);
      text-align: center;
      transition: all 0.3s;
      position: relative;
    }
    .badge-item:hover {
      transform: translateY(-2px);
      background: var(--white-08);
    }
    .badge-item.locked {
      opacity: 0.5;
      filter: grayscale(0.8);
    }
    .badge-item.newly-unlocked {
      animation: glow 1s ease-in-out 3;
      border-color: var(--yellow);
      box-shadow: 0 0 20px rgba(251,191,36,0.3);
    }
    .badge-icon {
      font-size: 36px;
      margin-bottom: 8px;
      display: block;
    }
    .badge-name {
      font-size: 11px;
      font-weight: 600;
      color: white;
      margin-bottom: 4px;
    }
    .badge-desc {
      font-size: 9px;
      color: var(--white-40);
      line-height: 1.3;
    }
    .badge-rarity {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .badge-rarity.bronze { background: #cd7f32; }
    .badge-rarity.prata { background: #c0c0c0; }
    .badge-rarity.ouro { background: linear-gradient(135deg, #ffd700, #ffb700); }
    .badge-rarity.platina { background: linear-gradient(135deg, #e5e4e2, #a0b2c6); }
    .badge-rarity.diamante { background: linear-gradient(135deg, #b9f2ff, #00bfff); }
    .badge-rarity.especial { background: linear-gradient(135deg, #ff6b6b, #feca57); animation: pulse 1s infinite; }
    
    .badge-category {
      margin-bottom: 24px;
    }
    .badge-category-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--white-60);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* ============================================
       SISTEMA DE NÍVEIS E XP
       ============================================ */
    .level-card {
      padding: 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(139,92,246,0.15) 0%, rgba(236,72,153,0.1) 100%);
      border: 1px solid rgba(139,92,246,0.3);
      margin-bottom: 16px;
    }
    .level-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .level-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .level-badge {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      background: linear-gradient(135deg, var(--violet), var(--pink));
      box-shadow: 0 8px 32px rgba(139,92,246,0.4);
    }
    .level-title {
      font-size: 24px;
      font-weight: 700;
      color: white;
    }
    .level-subtitle {
      font-size: 13px;
      color: var(--white-60);
    }
    .level-xp {
      text-align: right;
    }
    .level-xp-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--yellow);
    }
    .level-xp-label {
      font-size: 11px;
      color: var(--white-40);
    }
    .xp-bar-container {
      margin-top: 8px;
    }
    .xp-bar {
      height: 12px;
      background: var(--white-10);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
    .xp-bar-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--violet), var(--pink));
      transition: width 1s ease-out;
      position: relative;
    }
    .xp-bar-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 2s infinite;
    }
    .xp-bar-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 11px;
      color: var(--white-40);
    }
    
    .xp-source-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 16px;
    }
    .xp-source-item {
      padding: 12px;
      border-radius: 12px;
      background: var(--white-05);
      border: 1px solid var(--border);
    }
    .xp-source-icon {
      font-size: 20px;
      margin-bottom: 6px;
    }
    .xp-source-name {
      font-size: 12px;
      color: var(--white-60);
      margin-bottom: 2px;
    }
    .xp-source-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--yellow);
    }
    
    /* ============================================
       LEADERBOARD
       ============================================ */
    .leaderboard-card {
      padding: 20px;
      border-radius: 20px;
      background: var(--white-05);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .leaderboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .leaderboard-title {
      font-size: 16px;
      font-weight: 600;
    }
    .leaderboard-period {
      font-size: 12px;
      color: var(--white-40);
    }
    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 12px;
      background: var(--white-05);
      margin-bottom: 8px;
      transition: all 0.3s;
    }
    .leaderboard-item:hover {
      background: var(--white-10);
    }
    .leaderboard-rank {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }
    .leaderboard-rank.gold {
      background: linear-gradient(135deg, #ffd700, #ffb700);
      color: #1a1a1a;
    }
    .leaderboard-rank.silver {
      background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
      color: #1a1a1a;
    }
    .leaderboard-rank.bronze {
      background: linear-gradient(135deg, #cd7f32, #b87333);
      color: white;
    }
    .leaderboard-rank.normal {
      background: var(--white-10);
      color: var(--white-60);
    }
    .leaderboard-avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .leaderboard-info {
      flex: 1;
    }
    .leaderboard-name {
      font-weight: 600;
      font-size: 14px;
    }
    .leaderboard-stats {
      font-size: 12px;
      color: var(--white-60);
    }
    .leaderboard-score {
      text-align: right;
    }
    .leaderboard-score-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--yellow);
    }
    .leaderboard-score-label {
      font-size: 10px;
      color: var(--white-40);
    }
    
    /* ============================================
       DESAFIOS
       ============================================ */
    .challenge-card {
      padding: 20px;
      border-radius: 16px;
      background: var(--white-05);
      border: 1px solid var(--border);
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }
    .challenge-card.active {
      border-color: var(--violet);
      background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(139,92,246,0.05));
    }
    .challenge-card.completed {
      border-color: var(--green);
      background: linear-gradient(135deg, rgba(34,197,94,0.1), rgba(34,197,94,0.05));
    }
    .challenge-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .challenge-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: var(--white-10);
      flex-shrink: 0;
    }
    .challenge-info {
      flex: 1;
    }
    .challenge-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .challenge-desc {
      font-size: 12px;
      color: var(--white-60);
    }
    .challenge-reward {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .challenge-reward-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--yellow);
    }
    .challenge-progress {
      margin-top: 12px;
    }
    .challenge-progress-bar {
      height: 8px;
      background: var(--white-10);
      border-radius: 4px;
      overflow: hidden;
    }
    .challenge-progress-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--violet), var(--pink));
      transition: width 0.5s ease-out;
    }
    .challenge-progress-text {
      font-size: 11px;
      color: var(--white-60);
      margin-top: 4px;
      text-align: right;
    }
    .challenge-status {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
    }
    .challenge-status.active {
      background: rgba(139,92,246,0.2);
      color: var(--violet);
    }
    .challenge-status.completed {
      background: rgba(34,197,94,0.2);
      color: var(--green);
    }
    
    /* ============================================
       PLANO DE ESTUDOS IA
       ============================================ */
    .study-plan-card {
      padding: 20px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(6,182,212,0.1) 0%, rgba(139,92,246,0.1) 100%);
      border: 1px solid rgba(6,182,212,0.3);
      margin-bottom: 16px;
    }
    .study-plan-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .study-plan-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
    }
    .study-plan-title {
      font-size: 16px;
      font-weight: 600;
    }
    .study-plan-subtitle {
      font-size: 12px;
      color: var(--white-60);
    }
    .study-plan-countdown {
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--white-05);
      text-align: center;
      margin-bottom: 16px;
    }
    .study-plan-countdown-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--cyan);
    }
    .study-plan-countdown-label {
      font-size: 12px;
      color: var(--white-60);
    }
    .study-plan-recommendation {
      padding: 16px;
      border-radius: 12px;
      background: var(--white-05);
      margin-bottom: 12px;
    }
    .study-plan-recommendation-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .study-plan-recommendation-title {
      font-weight: 600;
      font-size: 14px;
    }
    .study-plan-recommendation-text {
      font-size: 13px;
      color: var(--white-80);
      line-height: 1.5;
    }
    .study-plan-schedule {
      margin-top: 16px;
    }
    .study-plan-schedule-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .study-plan-day {
      padding: 14px;
      border-radius: 12px;
      background: var(--white-05);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .study-plan-day-number {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      background: var(--white-10);
    }
    .study-plan-day-content {
      flex: 1;
    }
    .study-plan-day-subject {
      font-weight: 600;
      font-size: 14px;
    }
    .study-plan-day-time {
      font-size: 12px;
      color: var(--white-60);
    }
    .study-plan-day-status {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
    }
    .study-plan-day-status.pending {
      background: var(--white-10);
      color: var(--white-60);
    }
    .study-plan-day-status.done {
      background: rgba(34,197,94,0.2);
      color: var(--green);
    }
    
    /* ============================================
       SCROLLBAR
       ============================================ */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { 
      background: var(--white-20); 
      border-radius: 3px; 
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--white-40); }
    
    /* ============================================
       SELECTION
       ============================================ */
    ::selection { 
      background: rgba(139,92,246,0.3); 
      color: white; 
    }
    
    /* ============================================
       UTILITY CLASSES
       ============================================ */
    .p-4 { padding: 16px; }
    .p-5 { padding: 20px; }
    .p-6 { padding: 24px; }
    .mb-1 { margin-bottom: 4px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mt-4 { margin-top: 16px; }
    .flex { display: flex; }
    .flex-1 { flex: 1; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .text-center { text-align: center; }
    .text-right { text-align: right; }
    .text-xs { font-size: 11px; }
    .text-sm { font-size: 13px; }
    .text-lg { font-size: 18px; }
    .text-xl { font-size: 20px; }
    .text-2xl { font-size: 24px; }
    .text-3xl { font-size: 30px; }
    .text-4xl { font-size: 36px; }
    .text-5xl { font-size: 48px; }
    .font-bold { font-weight: 700; }
    .font-semibold { font-weight: 600; }
    .font-medium { font-weight: 500; }
    .text-white { color: white; }
    .text-white-60 { color: var(--white-60); }
    .text-white-40 { color: var(--white-40); }
    .text-violet { color: var(--violet); }
    .text-pink { color: var(--pink); }
    .text-green { color: var(--green); }
    .text-yellow { color: var(--yellow); }
    .text-red { color: var(--red); }
    .text-cyan { color: var(--cyan); }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .w-full { width: 100%; }
    .hidden { display: none; }
    .grid { display: grid; }
    .grid-cols-2 { grid-template-columns: 1fr 1fr; }
    .grid-cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
    
    /* ============================================
       RESPONSIVO - DESKTOP
       ============================================ */
    @media (min-width: 1024px) {
      .app { max-width: none; display: flex; }
      
      .nav-sidebar {
        display: flex;

    const App = () => {

      const [toasts, setToasts] = useState([]);
      const [editingSession, setEditingSession] = useState(null);
      
      // Dados persistidos
      const [sessions, setSessions] = useState(() => {
        const saved = localStorage.getItem('manaKelinha_sessions');
        return saved ? JSON.parse(saved) : { mana: [], kelinha: [] };
      });
      
      const [userData, setUserData] = useState(() => {
        const saved = localStorage.getItem('manaKelinha_userData');
        return saved ? JSON.parse(saved) : {
          mana: { xp: 0, level: 1, streak: 0, unlockedBadges: [] },
          kelinha: { xp: 0, level: 1, streak: 0, unlockedBadges: [] }
        };
      });
      
      // Salvar no localStorage
      useEffect(() => {
        localStorage.setItem('manaKelinha_sessions', JSON.stringify(sessions));
      }, [sessions]);
      
      useEffect(() => {
        localStorage.setItem('manaKelinha_userData', JSON.stringify(userData));
      }, [userData]);
      
      const addToast = (message, type = 'info', xp = 0) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type, xp }]);
      };
      
      const removeToast = (id) => {
        setToasts(prev => prev.filter(t => t.id !== id));
      };
      
      const calculateXP = (session) => {
        let xp = 0;
        
        // XP por tempo (50 XP por hora)
        const minutes = (session.h || 0) * 60 + (session.m || 0);
        xp += Math.floor(minutes / 60 * 50);
        
        // XP por questões
        xp += (session.qT || 0) * 2;
        xp += (session.qC || 0) * 3; // Bônus por acerto
        
        // Bônus por dificuldade
        if (session.diff === 'medio') xp += 20;
        if (session.diff === 'dificil') xp += 50;
        
        return xp;
      };
      
      const checkBadges = (userId, userSessions) => {
        const currentBadges = userData[userId].unlockedBadges;
        const newBadges = [];
        
        const stats = {
          totalSessions: userSessions.length,
          totalMinutes: userSessions.reduce((acc, s) => acc + (s.h || 0) * 60 + (s.m || 0), 0),
          totalQuestions: userSessions.reduce((acc, s) => acc + (s.qT || 0), 0),
          uniqueSubjects: new Set(userSessions.map(s => s.subject)).size,
          bestAccuracy: userSessions.filter(s => s.qT > 0).length > 0
            ? Math.max(...userSessions.filter(s => s.qT > 0).map(s => (s.qC / s.qT) * 100))
            : 0,
          easySessions: userSessions.filter(s => s.diff === 'facil').length,
          mediumSessions: userSessions.filter(s => s.diff === 'medio').length,
          hardSessions: userSessions.filter(s => s.diff === 'dificil').length,
          longestSession: userSessions.length > 0
            ? Math.max(...userSessions.map(s => (s.h || 0) * 60 + (s.m || 0)))
            : 0,
          shortSessions: userSessions.filter(s => {
            const mins = (s.h || 0) * 60 + (s.m || 0);
            return mins >= 15 && mins <= 25;
          }).length,
          streak: userData[userId].streak,
          hasStudiedLateNight: false,
          hasStudiedWeekend: false,
          maxHoursInDay: 0,
          maxHoursInWeek: 0,
          bothStudiedSameDay: false,
          duelsWon: 0,
          totalBadges: currentBadges.length
        };
        
        Object.values(BADGES).forEach(badge => {
          if (!currentBadges.includes(badge.id) && badge.condition(stats)) {
            newBadges.push(badge);
          }
        });
        
        return newBadges;
      };
      
      const handleSaveSession = (session) => {
        const userSessions = sessions[currentUser] || [];
        let newSessions;
        
        if (editingSession) {
          newSessions = userSessions.map(s => s.id === session.id ? session : s);
        } else {
          newSessions = [...userSessions, session];
        }
        
        setSessions(prev => ({ ...prev, [currentUser]: newSessions }));
        
        // Calcular e adicionar XP
        const xpGained = editingSession ? 0 : calculateXP(session);
        if (xpGained > 0) {
          setUserData(prev => ({
            ...prev,
            [currentUser]: {
              ...prev[currentUser],
              xp: prev[currentUser].xp + xpGained
            }
          }));
          addToast('XP ganho!', 'xp', xpGained);
        }
        
        // Verificar badges
        const newBadges = checkBadges(currentUser, newSessions);
        if (newBadges.length > 0) {
          const badgeXP = newBadges.reduce((acc, b) => acc + b.xpReward, 0);
          setUserData(prev => ({
            ...prev,
            [currentUser]: {
              ...prev[currentUser],
              unlockedBadges: [...prev[currentUser].unlockedBadges, ...newBadges.map(b => b.id)],
              xp: prev[currentUser].xp + badgeXP
            }
          }));
          
          newBadges.forEach((badge, i) => {
            setTimeout(() => {
              addToast(`🏆 Badge desbloqueado: ${badge.name}!`, 'badge', badge.xpReward);
            }, i * 500);
          });
        }
        
        setEditingSession(null);
        setCurrentScreen('dashboard');
      };
      
      const handleDeleteSession = (sessionId) => {
        setSessions(prev => ({
          ...prev,
          [currentUser]: prev[currentUser].filter(s => s.id !== sessionId)
        }));
      };
      
      const handleEditSession = (session) => {
        setEditingSession(session);
        setCurrentScreen('session');
      };
      
      const handleLogout = () => {
        setCurrentUser(null);
        setCurrentScreen('dashboard');
        setEditingSession(null);
      };
      
      // Renderização condicional
      if (!currentUser) {
        return React.createElement(LoginScreen, { onLogin: setCurrentUser, addToast });
      }
      
      const user = USERS[currentUser];
      const userSessions = sessions[currentUser] || [];
      const partnerSessions = sessions[user.partner] || [];
      const { xp, level, streak, unlockedBadges } = userData[currentUser];
      
      // Toast container
      const toastContainer = React.createElement('div', { className: 'toast-container' },
        toasts.map(t => 
          React.createElement(Toast, {
            key: t.id,
            message: t.message,
            type: t.type,
            xp: t.xp,
            onClose: () => removeToast(t.id)
          })
        )
      );
      
      // Navegação mobile
      const navItems = [
        { id: 'dashboard', label: 'Início', icon: Icons.home },
        { id: 'session', label: 'Estudar', icon: Icons.plus },
        { id: 'badges', label: 'Badges', icon: Icons.award },
        { id: 'level', label: 'Nível', icon: Icons['trending-up'] },
        { id: 'challenges', label: 'Desafios', icon: Icons.trophy },
        { id: 'plan', label: 'Plano', icon: Icons['cpu'] },
        { id: 'history', label: 'Histórico', icon: Icons.calendar }
      ];
      
      const bottomNav = React.createElement('nav', { className: 'nav-bottom' },
        React.createElement('div', { className: 'nav-items' },
          navItems.slice(0, 5).map(item => 
            React.createElement('button', {
              key: item.id,
              className: `nav-item ${currentScreen === item.id ? 'active ' + user.color : ''}`,
              onClick: () => {
                if (item.id === 'session') {
                  setEditingSession(null);
                }
                setCurrentScreen(item.id);
              }
            },
              item.icon({ width: 20, height: 20 }),
              React.createElement('span', null, item.label)
            )
          )
        )
      );
      
      // Top bar
      const topBar = React.createElement('header', { className: 'top-bar' },
        React.createElement('div', { className: 'logo text-gradient' }, 'Mana e Kelinha 💕'),
        React.createElement('div', { className: 'actions' },
          React.createElement('button', {
            className: `user-chip ${user.color}`,
            onClick: handleLogout
          },
            React.createElement('span', null, user.emoji),
            React.createElement('span', null, user.name)
          )
        )
      );
      
      // Conteúdo principal
      let mainContent;
      switch (currentScreen) {
        case 'dashboard':
          mainContent = React.createElement(Dashboard, {
            userId: currentUser,
            sessions: userSessions,
            partnerSessions,
            xp,
            level,
            streak,
            unlockedBadges,
            onAddSession: () => {
              setEditingSession(null);
              setCurrentScreen('session');
            },
            addToast
          });
          break;
        case 'session':
          mainContent = React.createElement(SessionForm, {
            userId: currentUser,
            existingSessions: userSessions,
            editingSession,
            onSave: handleSaveSession,
            onCancel: () => {
              setEditingSession(null);
              setCurrentScreen('dashboard');
            },
            addToast
          });
          break;
        case 'badges':
          mainContent = React.createElement(BadgesScreen, {
            userId: currentUser,
            sessions: userSessions,
            unlockedBadges,
            addToast
          });
          break;
        case 'level':
          mainContent = React.createElement(LevelScreen, {
            userId: currentUser,
            xp,
            addToast
          });
          break;
        case 'challenges':
          mainContent = React.createElement(ChallengesScreen, {
            userId: currentUser,
            sessions: userSessions,
            partnerSessions,
            addToast
          });
          break;
        case 'plan':
          mainContent = React.createElement(StudyPlanScreen, {
            userId: currentUser,
            sessions: userSessions,
            addToast
          });
          break;
        case 'history':
          mainContent = React.createElement(HistoryScreen, {
            userId: currentUser,
            sessions: userSessions,
            onEditSession: handleEditSession,
            onDeleteSession: handleDeleteSession,
            addToast
          });
          break;
        default:
          mainContent = React.createElement(Dashboard, {
            userId: currentUser,
            sessions: userSessions,
            partnerSessions,
            xp,
            level,
            streak,
            unlockedBadges,
            onAddSession: () => setCurrentScreen('session'),
            addToast
          });
      }
      
      return React.createElement(React.Fragment, null,
        toastContainer,
        topBar,
        React.createElement('main', { className: 'content' }, mainContent),
        bottomNav
      );
    };
    
    // Renderizar app
    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
