<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="Mana e Kelinha - Sistema de estudos gamificado para casais">
  <title>Mana e Kelinha 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       MANA E KELINHA - CSS COMPLETO
       Design System: Glassmorphism + Dark Theme
       ============================================ */
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --bg: #0a0a0f;
      --bg-card: rgba(255,255,255,0.05);
      --violet: #8b5cf6;
      --pink: #ec4899;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --orange: #f97316;
      --cyan: #06b6d4;
      --purple: #a855f7;
      --white: #ffffff;
      --white-80: rgba(255,255,255,0.8);
      --white-60: rgba(255,255,255,0.6);
      --white-40: rgba(255,255,255,0.4);
      --white-20: rgba(255,255,255,0.2);
      --white-10: rgba(255,255,255,0.1);
      --white-05: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      
      /* Sombras */
      --shadow-violet: 0 10px 40px -10px rgba(139,92,246,0.4);
      --shadow-pink: 0 10px 40px -10px rgba(236,72,153,0.4);
      --shadow-green: 0 10px 40px -10px rgba(34,197,94,0.4);
      --shadow-gold: 0 10px 40px -10px rgba(234,179,8,0.4);
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
    }
    
    /* ============================================
       BACKGROUND ANIMADO
       ============================================ */
    .bg-animated {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
      animation: float 20s ease-in-out infinite;
    }
    .orb-1 { 
      width: 600px; height: 600px; 
      background: var(--violet); 
      top: -250px; left: -200px; 
      animation-delay: 0s;
    }
    .orb-2 { 
      width: 500px; height: 500px; 
      background: var(--pink); 
      bottom: -200px; right: -150px; 
      animation-delay: -10s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }
    
    /* ============================================
       LAYOUT RESPONSIVO
       ============================================ */
    .app { 
      position: relative; 
      z-index: 1; 
      width: 100%;
      max-width: 100%;
      margin: 0 auto; 
      min-height: 100vh;
      isolation: isolate;
    }
    .content { 
      padding: 80px 16px 100px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    /* ============================================
       COMPONENTES UI - GLASS CARDS
       ============================================ */
    .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      margin-bottom: 16px;
      overflow: hidden;
      animation: fadeIn 0.4s ease-out;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card-hover:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-violet);
    }
    .card-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-body { padding: 20px; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px currentColor; }
      50% { box-shadow: 0 0 20px currentColor, 0 0 30px currentColor; }
    }
    
    /* ============================================
       TIPOGRAFIA
       ============================================ */
    .text-gradient {
      background: linear-gradient(135deg, #a78bfa 0%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .text-gradient-green {
      background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .text-gradient-gold {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 0%, #d97706 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* ============================================
       BOTÕES
       ============================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .btn:hover::before { left: 100%; }
    .btn:active { transform: scale(0.98); }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--violet) 0%, #7c3aed 100%);
      color: white;
    }
    .btn-primary:hover { 
      transform: translateY(-2px); 
      box-shadow: var(--shadow-violet); 
    }
    .btn-gleici {
      background: linear-gradient(135deg, var(--pink) 0%, #db2777 100%);
      color: white;
    }
    .btn-gleici:hover { 
      transform: translateY(-2px); 
      box-shadow: var(--shadow-pink); 
    }
    .btn-success {
      background: linear-gradient(135deg, var(--green) 0%, #16a34a 100%);
      color: white;
    }
    .btn-success:hover { 
      transform: translateY(-2px); 
      box-shadow: var(--shadow-green); 
    }
    .btn-gold {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      color: #1a1a1a;
    }
    .btn-gold:hover { 
      transform: translateY(-2px); 
      box-shadow: var(--shadow-gold); 
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: white;
    }
    .btn-outline:hover { background: var(--white-05); }
    .btn-danger {
      background: linear-gradient(135deg, var(--red) 0%, #dc2626 100%);
      color: white;
    }
    .btn-sm {
      padding: 8px 16px;
      font-size: 12px;
    }
    .btn-icon {
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 10px;
    }
    .btn:disabled { 
      opacity: 0.5; 
      cursor: not-allowed;
      transform: none !important;
    }
    
    /* ============================================
       INPUTS E FORMULÁRIOS
       ============================================ */
    .input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--white-05);
      border: 1px solid var(--border);
      color: white;
      font-size: 14px;
      transition: all 0.3s;
      font-family: inherit;
    }
    .input:focus { 
      outline: none; 
      border-color: var(--violet); 
      box-shadow: 0 0 0 3px rgba(139,92,246,0.2); 
    }
    .input::placeholder { color: var(--white-40); }
    textarea.input { resize: none; min-height: 80px; }
    .input-group {
      display: flex;
      gap: 12px;
    }
    .input-group .input { flex: 1; }
    
    .form-label {
      display: block;
      font-size: 13px;
      color: var(--white-60);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-label .optional {
      color: var(--white-40);
      font-weight: 400;
    }
    
    /* ============================================
       SELEÇÃO DE USUÁRIO (LOGIN)
       ============================================ */
    .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .user-btn {
      padding: 24px 16px;
      border-radius: 16px;
      border: 2px solid var(--border);
      background: var(--white-05);
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 100%;
    }
    .user-btn:hover { 
      background: var(--white-10); 
      transform: translateY(-2px);
    }
    .user-btn.selected.mana { 
      border-color: var(--violet); 
      background: rgba(139,92,246,0.15); 
    }
    .user-btn.selected.kelinha { 
      border-color: var(--pink); 
      background: rgba(236,72,153,0.15); 
    }
    .user-btn .emoji { font-size: 44px; display: block; line-height: 1; }
    .user-btn .name { font-weight: 700; color: white; font-size: 16px; display: block; }
    .user-btn .profile { font-size: 12px; color: var(--white-40); display: block; }
    
    /* ============================================
       ESTATÍSTICAS
       ============================================ */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-card { padding: 20px; }
    .stat-value { 
      font-size: 28px; 
      font-weight: 700; 
      color: white;
      line-height: 1.2;
    }
    .stat-label { 
      font-size: 11px; 
      color: var(--white-60); 
      text-transform: uppercase; 
      letter-spacing: 0.5px; 
      margin-top: 4px; 
    }
    .stat-change {
      font-size: 11px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat-change.positive { color: var(--green); }
    .stat-change.negative { color: var(--red); }
    
    /* ============================================
       PROGRESS RING
       ============================================ */
    .progress-ring { position: relative; width: 120px; height: 120px; }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring circle { fill: none; stroke-width: 8; }
    .progress-ring .bg { stroke: var(--white-10); }
    .progress-ring .progress { 
      stroke-linecap: round; 
      transition: stroke-dashoffset 1.5s ease-out; 
    }
    .progress-ring .value {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      font-weight: 700;
    }
    
    /* ============================================
       PROGRESS BAR
       ============================================ */
    .progress-bar { 
      height: 8px; 
      background: var(--white-10); 
      border-radius: 4px; 
      overflow: hidden; 
    }
    .progress-bar-fill { 
      height: 100%; 
      border-radius: 4px; 
      transition: width 1s ease-out; 
    }
    
    /* ============================================
       DIFICULDADE
       ============================================ */
    .diff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .diff-btn {
      padding: 14px 8px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--white-05);
      color: var(--white-60);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .diff-btn:hover { background: var(--white-10); }
    .diff-btn.active.facil { 
      border-color: var(--green); 
      background: rgba(34,197,94,0.15); 
      color: var(--green); 
    }
    .diff-btn.active.medio { 
      border-color: var(--yellow); 
      background: rgba(234,179,8,0.15); 
      color: var(--yellow); 
    }
    .diff-btn.active.dificil { 
      border-color: var(--red); 
      background: rgba(239,68,68,0.15); 
      color: var(--red); 
    }
    
    /* ============================================
       CRONÔMETRO
       ============================================ */
    .timer-display {
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 52px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 4px;
      color: var(--violet);
      text-shadow: 0 0 30px rgba(139,92,246,0.5);
      line-height: 1;
    }
    .timer-display.paused { 
      color: var(--white-40); 
      text-shadow: none; 
    }
    .timer-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .timer-status.running {
      background: rgba(34,197,94,0.2);
      color: var(--green);
    }
    .timer-status.paused {
      background: var(--white-10);
      color: var(--white-60);
    }
    
    /* ============================================
       NAVEGAÇÃO MOBILE
       ============================================ */
    .nav-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      background: linear-gradient(to top, rgba(10,10,15,0.98), rgba(10,10,15,0.9));
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-items { 
      display: flex; 
      justify-content: space-around;
      max-width: 600px;
      margin: 0 auto;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 10px;
      border-radius: 12px;
      color: var(--white-40);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 10px;
      transition: all 0.3s;
      flex: 1;
    }
    .nav-item:hover { color: white; }
    .nav-item.active.mana { 
      color: var(--violet); 
      background: rgba(139,92,246,0.15); 
    }
    .nav-item.active.kelinha { 
      color: var(--pink); 
      background: rgba(236,72,153,0.15); 
    }
    .nav-item svg { width: 20px; height: 20px; }
    
    /* ============================================
       TOP BAR
       ============================================ */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      background: linear-gradient(to bottom, rgba(10,10,15,0.98), rgba(10,10,15,0.9));
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-bar .logo { font-size: 20px; font-weight: 700; }
    .top-bar .actions { display: flex; gap: 8px; align-items: center; }
    .top-bar-inner {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--white-05);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      position: relative;
    }
    .icon-btn:hover { background: var(--white-10); }
    .icon-btn svg { width: 18px; height: 18px; }
    
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 9px;
      background: var(--red);
      color: white;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .user-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      font-size: 13px;
      color: white;
      transition: all 0.3s;
    }
    .user-chip.mana { 
      background: rgba(139,92,246,0.2); 
      border: 1px solid rgba(139,92,246,0.3); 
    }
    .user-chip.kelinha { 
      background: rgba(236,72,153,0.2); 
      border: 1px solid rgba(236,72,153,0.3); 
    }
    
    /* ============================================
       PAINEL DE NOTIFICAÇÕES
       ============================================ */
    .notif-panel {
      position: fixed;
      top: 70px;
      right: 16px;
      width: 320px;
      max-height: 400px;
      z-index: 200;
      animation: slideIn 0.3s ease-out;
    }
    .notif-item {
      padding: 14px;
      border-radius: 12px;
      background: var(--white-05);
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }
    .notif-item .time { 
      font-size: 11px; 
      color: var(--white-40); 
      margin-bottom: 4px; 
    }
    .notif-item .msg { font-size: 13px; color: var(--white-80); }
    
    /* ============================================
       GRÁFICO SEMANAL
       ============================================ */
    .week-chart { 
      display: flex; 
      align-items: flex-end; 
      justify-content: space-between; 
      height: 100px; 
      gap: 8px; 
    }
    .week-bar { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 8px; 
    }
    .week-bar .bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      transition: height 0.6s ease-out;
      min-height: 4px;
    }
    .week-bar .bar.has-data { 
      background: linear-gradient(to top, var(--violet), #a78bfa); 
    }
    .week-bar .bar.no-data { background: var(--white-10); }
    .week-bar .label { font-size: 10px; color: var(--white-40); }
    
    /* ============================================
       LISTA DE MATÉRIAS
       ============================================ */
    .subject-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 12px;
      background: var(--white-05);
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }
    .subject-item .name { flex: 1; font-size: 14px; }
    .subject-item .bar-container { 
      flex: 2; 
      height: 6px; 
      background: var(--white-10); 
      border-radius: 3px; 
      overflow: hidden; 
    }
    .subject-item .bar-fill { 
      height: 100%; 
      border-radius: 3px; 
      transition: width 0.8s ease-out; 
    }
    .subject-item .value { 
      width: 45px; 
      text-align: right; 
      font-size: 12px; 
      font-weight: 600; 
    }
    
    /* ============================================
       HERO CARD
       ============================================ */
    .hero-card {
      padding: 28px;
      border-radius: 24px;
      margin-bottom: 20px;
    }
    .hero-card.mana {
      background: linear-gradient(135deg, rgba(139,92,246,0.3) 0%, rgba(124,58,237,0.2) 50%, rgba(59,130,246,0.2) 100%);
    }
    .hero-card.kelinha {
      background: linear-gradient(135deg, rgba(236,72,153,0.3) 0%, rgba(219,39,119,0.2) 50%, rgba(249,115,22,0.2) 100%);
    }
    
    /* ============================================
       TAGS
       ============================================ */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      background: var(--white-10);
      font-size: 12px;
      color: var(--white-60);
    }
    .tag-primary {
      background: rgba(139,92,246,0.2);
      color: var(--violet);
    }
    .tag-gold {
      background: rgba(251,191,36,0.2);
      color: #fbbf24;
    }
    .tag-green {
      background: rgba(34,197,94,0.2);
      color: var(--green);
    }
    
    /* ============================================
       STREAK
       ============================================ */
    .streak-icon {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .streak-icon.gold { 
      background: linear-gradient(135deg, #eab308 0%, #f97316 100%); 
    }
    .streak-icon.orange { 
      background: linear-gradient(135deg, #f97316 0%, #ef4444 100%); 
    }
    .streak-icon.green { 
      background: linear-gradient(135deg, #22c55e 0%, #10b981 100%); 
    }
    
    /* ============================================
       MODAL
       ============================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s;
    }
    .modal-content {
      width: 100%;
      max-width: 450px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideIn 0.3s;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h3 {
      font-size: 18px;
      font-weight: 600;
    }
    .modal-body { padding: 20px; }
    
    /* ============================================
       LISTA DE SESSÕES (HISTÓRICO)
       ============================================ */
    .session-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .session-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border-radius: 14px;
      background: var(--white-05);
      border: 1px solid var(--border);
      transition: all 0.3s;
    }
    .session-item:hover {
      background: var(--white-10);
      border-color: var(--white-20);
    }
    .session-item .icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .session-item .icon.facil { background: rgba(34,197,94,0.2); }
    .session-item .icon.medio { background: rgba(234,179,8,0.2); }
    .session-item .icon.dificil { background: rgba(239,68,68,0.2); }
    .session-item .content { flex: 1; min-width: 0; }
    .session-item .subject {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-item .meta {
      font-size: 12px;
      color: var(--white-60);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .session-item .meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .session-item .actions {
      display: flex;
      gap: 6px;
    }
    .session-item .action-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: none;
      background: var(--white-10);
      color: var(--white-60);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .session-item .action-btn:hover {
      background: var(--white-20);
      color: white;
    }
    .session-item .action-btn.delete:hover {
      background: rgba(239,68,68,0.2);
      color: var(--red);
    }
    
    /* ============================================
       METAS
       ============================================ */
    .goal-card {
      padding: 20px;
      border-radius: 16px;
      background: var(--white-05);
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .goal-card .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .goal-card .title {
      font-weight: 600;
      font-size: 15px;
    }
    .goal-card .subtitle {
      font-size: 12px;
      color: var(--white-60);
      margin-top: 2px;
    }
    .goal-card .progress-text {
      font-size: 18px;
      font-weight: 700;
    }
    .goal-card .progress-bar {
      height: 10px;
      margin-top: 8px;
    }
    
    /* ============================================
       FILTROS
       ============================================ */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--white-05);
      color: var(--white-60);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .filter-btn:hover { background: var(--white-10); }
    .filter-btn.active {
      background: var(--violet);
      border-color: var(--violet);
      color: white;
    }
    
    /* ============================================
       CONFETTI
       ============================================ */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 9999;
      animation: confetti-fall 2.5s ease-out forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    
    /* ============================================
       TOAST NOTIFICATIONS
       ============================================ */
    /* Toast para erros inline apenas */
    .toast-container {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 400;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 90%;
      max-width: 380px;
      pointer-events: none;
    }
    .toast {
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(10,10,15,0.97);
      border: 1px solid var(--red);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.3s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      pointer-events: all;
    }
    .toast-icon { font-size: 18px; }
    .toast-message { flex: 1; font-size: 13px; }
    .toast-xp { font-size: 12px; color: var(--yellow); font-weight: 600; }

    /* Notificações Panel */
    .notif-btn {
      position: relative;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: rgba(255,255,255,0.8);
      transition: all 0.2s; flex-shrink: 0;
    }
    .notif-btn:hover { background: rgba(255,255,255,0.12); }
    .notif-badge {
      position: absolute;
      top: -5px; right: -5px;
      min-width: 18px; height: 18px;
      border-radius: 9px;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      color: white; font-size: 10px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
      animation: pulse 2s ease-in-out infinite;
    }
    .notif-panel-overlay {
      position: fixed; inset: 0; z-index: 800;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    }
    .notif-panel {
      position: fixed;
      top: 0; right: 0;
      width: min(360px, 100vw);
      height: 100vh;
      background: linear-gradient(180deg, rgba(15,10,25,0.99) 0%, rgba(10,8,20,0.99) 100%);
      border-left: 1px solid rgba(255,255,255,0.1);
      z-index: 801;
      display: flex; flex-direction: column;
      animation: slideInRight 0.25s ease-out;
    }
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .notif-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .notif-panel-list {
      flex: 1; overflow-y: auto; padding: 12px;
      scrollbar-width: none;
    }
    .notif-panel-list::-webkit-scrollbar { display: none; }
    .notif-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px; border-radius: 14px; margin-bottom: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      transition: background 0.2s;
    }
    .notif-item.unread {
      background: rgba(139,92,246,0.08);
      border-color: rgba(139,92,246,0.2);
    }
    .notif-item-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
    .notif-item-body { flex: 1; }
    .notif-item-msg { font-size: 13px; line-height: 1.4; color: rgba(255,255,255,0.85); }
    .notif-item-xp { font-size: 11px; color: #eab308; font-weight: 700; margin-top: 3px; }
    .notif-item-time { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 3px; }
    .notif-unread-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #8b5cf6; flex-shrink: 0; margin-top: 6px;
    }
    
    /* ============================================
       EXPORT/IMPORT
       ============================================ */
    .export-section {
      padding: 20px;
    }
    .export-btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }
    
    /* ============================================
       EMPTY STATE
       ============================================ */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
    }
    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .empty-state h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .empty-state p {
      color: var(--white-60);
      font-size: 14px;
    }
    
    /* ============================================
       LOGIN
       ============================================ */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box { width: 100%; max-width: 420px; margin: 0 auto; }
    .logo-box {
      width: 90px;
      height: 90px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--violet) 0%, var(--pink) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 45px;
      margin: 0 auto 24px;
      box-shadow: 0 10px 40px -10px rgba(139,92,246,0.5);
      animation: pulse 2s ease-in-out infinite;
    }
    
    /* ============================================
       SISTEMA DE BADGES
       ============================================ */
    .badge-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .badge-item {
      padding: 16px 12px;
      border-radius: 16px;
      background: var(--white-05);
      border: 1px solid var(--border);
      text-align: center;
      transition: all 0.3s;
      position: relative;
    }
    .badge-item:hover {
      transform: translateY(-2px);
      background: var(--white-08);
    }
    .badge-item.locked {
      opacity: 0.5;
      filter: grayscale(0.8);
    }
    .badge-item.newly-unlocked {
      animation: glow 1s ease-in-out 3;
      border-color: var(--yellow);
      box-shadow: 0 0 20px rgba(251,191,36,0.3);
    }
    .badge-icon {
      font-size: 36px;
      margin-bottom: 8px;
      display: block;
    }
    .badge-name {
      font-size: 11px;
      font-weight: 600;
      color: white;
      margin-bottom: 4px;
    }
    .badge-desc {
      font-size: 9px;
      color: var(--white-40);
      line-height: 1.3;
    }
    .badge-rarity {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .badge-rarity.bronze { background: #cd7f32; }
    .badge-rarity.prata { background: #c0c0c0; }
    .badge-rarity.ouro { background: linear-gradient(135deg, #ffd700, #ffb700); }
    .badge-rarity.platina { background: linear-gradient(135deg, #e5e4e2, #a0b2c6); }
    .badge-rarity.diamante { background: linear-gradient(135deg, #b9f2ff, #00bfff); }
    .badge-rarity.especial { background: linear-gradient(135deg, #ff6b6b, #feca57); animation: pulse 1s infinite; }
    
    .badge-category {
      margin-bottom: 24px;
    }
    .badge-category-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--white-60);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* ============================================
       SISTEMA DE NÍVEIS E XP
       ============================================ */
    .level-card {
      padding: 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(139,92,246,0.15) 0%, rgba(236,72,153,0.1) 100%);
      border: 1px solid rgba(139,92,246,0.3);
      margin-bottom: 16px;
    }
    .level-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .level-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .level-badge {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      background: linear-gradient(135deg, var(--violet), var(--pink));
      box-shadow: 0 8px 32px rgba(139,92,246,0.4);
    }
    .level-title {
      font-size: 24px;
      font-weight: 700;
      color: white;
    }
    .level-subtitle {
      font-size: 13px;
      color: var(--white-60);
    }
    .level-xp {
      text-align: right;
    }
    .level-xp-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--yellow);
    }
    .level-xp-label {
      font-size: 11px;
      color: var(--white-40);
    }
    .xp-bar-container {
      margin-top: 8px;
    }
    .xp-bar {
      height: 18px;
      background: rgba(255,255,255,0.07);
      border-radius: 10px;
      overflow: visible;
      position: relative;
    }
    .xp-bar-track {
      height: 100%;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .xp-bar-fill {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--violet), var(--pink));
      transition: width 1.4s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
    }
    .xp-bar-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
      animation: shimmer 2s infinite;
      border-radius: 10px;
    }
    .xp-bar-glow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 12px 4px rgba(139,92,246,0.7), 0 0 4px 2px white;
      transition: left 1.4s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
      z-index: 2;
    }
    .xp-bar-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 11px;
      color: var(--white-40);
    }
    .xp-bar-pct {
      font-size: 13px;
      font-weight: 700;
      color: var(--violet);
    }

    /* Trilha de níveis */
    .level-trail {
      position: relative;
      padding: 20px 0 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .level-trail::-webkit-scrollbar { display: none; }
    .level-trail-track {
      display: flex;
      align-items: center;
      gap: 0;
      min-width: max-content;
      padding: 0 12px;
    }
    .level-trail-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }
    .level-trail-node-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      transition: all 0.3s;
      cursor: default;
    }
    .level-trail-node.done .level-trail-node-dot {
      background: linear-gradient(135deg, var(--violet), var(--pink));
      border-color: var(--violet);
      box-shadow: 0 0 12px rgba(139,92,246,0.5);
    }
    .level-trail-node.current .level-trail-node-dot {
      background: linear-gradient(135deg, #eab308, #ca8a04);
      border-color: #eab308;
      box-shadow: 0 0 16px rgba(234,179,8,0.6);
      animation: pulse 2s ease-in-out infinite;
      width: 44px;
      height: 44px;
      font-size: 20px;
    }
    .level-trail-label {
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      margin-top: 5px;
      text-align: center;
    }
    .level-trail-node.done .level-trail-label,
    .level-trail-node.current .level-trail-label {
      color: rgba(255,255,255,0.7);
    }
    .level-trail-line {
      height: 3px;
      width: 28px;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
      margin-bottom: 20px;
    }
    .level-trail-line.done {
      background: linear-gradient(90deg, var(--violet), var(--pink));
    }
    
    .xp-source-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 16px;
    }
    .xp-source-item {
      padding: 12px;
      border-radius: 12px;
      background: var(--white-05);
      border: 1px solid var(--border);
    }
    .xp-source-icon {
      font-size: 20px;
      margin-bottom: 6px;
    }
    .xp-source-name {
      font-size: 12px;
      color: var(--white-60);
      margin-bottom: 2px;
    }
    .xp-source-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--yellow);
    }
    
    /* ============================================
       LEADERBOARD
       ============================================ */
    .leaderboard-card {
      padding: 20px;
      border-radius: 20px;
      background: var(--white-05);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .leaderboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .leaderboard-title {
      font-size: 16px;
      font-weight: 600;
    }
    .leaderboard-period {
      font-size: 12px;
      color: var(--white-40);
    }
    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 12px;
      background: var(--white-05);
      margin-bottom: 8px;
      transition: all 0.3s;
    }
    .leaderboard-item:hover {
      background: var(--white-10);
    }
    .leaderboard-rank {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }
    .leaderboard-rank.gold {
      background: linear-gradient(135deg, #ffd700, #ffb700);
      color: #1a1a1a;
    }
    .leaderboard-rank.silver {
      background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
      color: #1a1a1a;
    }
    .leaderboard-rank.bronze {
      background: linear-gradient(135deg, #cd7f32, #b87333);
      color: white;
    }
    .leaderboard-rank.normal {
      background: var(--white-10);
      color: var(--white-60);
    }
    .leaderboard-avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .leaderboard-info {
      flex: 1;
    }
    .leaderboard-name {
      font-weight: 600;
      font-size: 14px;
    }
    .leaderboard-stats {
      font-size: 12px;
      color: var(--white-60);
    }
    .leaderboard-score {
      text-align: right;
    }
    .leaderboard-score-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--yellow);
    }
    .leaderboard-score-label {
      font-size: 10px;
      color: var(--white-40);
    }
    
    /* ============================================
       DESAFIOS
       ============================================ */
    .challenge-card {
      padding: 20px;
      border-radius: 16px;
      background: var(--white-05);
      border: 1px solid var(--border);
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }
    .challenge-card.active {
      border-color: var(--violet);
      background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(139,92,246,0.05));
    }
    .challenge-card.completed {
      border-color: var(--green);
      background: linear-gradient(135deg, rgba(34,197,94,0.1), rgba(34,197,94,0.05));
    }
    .challenge-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .challenge-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: var(--white-10);
      flex-shrink: 0;
    }
    .challenge-info {
      flex: 1;
    }
    .challenge-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .challenge-desc {
      font-size: 12px;
      color: var(--white-60);
    }
    .challenge-reward {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .challenge-reward-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--yellow);
    }
    .challenge-progress {
      margin-top: 12px;
    }
    .challenge-progress-bar {
      height: 8px;
      background: var(--white-10);
      border-radius: 4px;
      overflow: hidden;
    }
    .challenge-progress-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--violet), var(--pink));
      transition: width 0.5s ease-out;
    }
    .challenge-progress-text {
      font-size: 11px;
      color: var(--white-60);
      margin-top: 4px;
      text-align: right;
    }
    .challenge-status {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
    }
    .challenge-status.active {
      background: rgba(139,92,246,0.2);
      color: var(--violet);
    }
    .challenge-status.completed {
      background: rgba(34,197,94,0.2);
      color: var(--green);
    }
    
    /* ============================================
       PLANO DE ESTUDOS IA
       ============================================ */
    .study-plan-card {

  <script>
    // ============================================
    // FIREBASE CONFIG
    // Crie um projeto em https://console.firebase.google.com
    // e substitua as configurações abaixo
    // ============================================
    const firebaseConfig = {
      apiKey: "AIzaSyAvh5lk4V9t3PgolmLQyrkJR5b0ZUOCpH8",
      authDomain: "quiz-atos.firebaseapp.com",
      databaseURL: "https://quiz-atos-default-rtdb.firebaseio.com",
      projectId: "quiz-atos",
      storageBucket: "quiz-atos.firebasestorage.app",
      messagingSenderId: "193416458072",
      appId: "1:193416458072:web:e865a004c9459910eaff2d",
      measurementId: "G-FD9BR7GJ3E"
    };

    let db = null;
    let firebaseReady = false;

    try {
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      firebaseReady = true;
      console.log('✅ Firebase conectado — modo online ativo');
    } catch(e) {
      console.warn('⚠️ Firebase erro:', e.message, '— usando localStorage');
    }

    // ============================================
    // CAMADA DE DADOS — funciona com ou sem Firebase
    // ============================================
    window.DataLayer = {
      // Salva sessões de um usuário
      saveSessions: async function(userId, sessions) {
        localStorage.setItem('manaKelinha_sessions', JSON.stringify(
          JSON.parse(localStorage.getItem('manaKelinha_sessions') || '{"mana":[],"kelinha":[]}')
        ));
        // Salva localmente sempre
        const all = JSON.parse(localStorage.getItem('manaKelinha_sessions') || '{"mana":[],"kelinha":[]}');
        all[userId] = sessions;
        localStorage.setItem('manaKelinha_sessions', JSON.stringify(all));

        if (firebaseReady) {
          try {
            await db.collection('data').doc('sessions').set({ [userId]: sessions }, { merge: true });
          } catch(e) { console.warn('Firebase save sessions error:', e); }
        }
      },

      // Salva userData (xp, level, badges, streak)
      saveUserData: async function(userData) {
        localStorage.setItem('manaKelinha_userData', JSON.stringify(userData));
        if (firebaseReady) {
          try {
            await db.collection('data').doc('userData').set(userData);
          } catch(e) { console.warn('Firebase save userData error:', e); }
        }
      },

      // Salva status online
      saveOnlineStatus: async function(userId, isOnline) {
        const status = { userId, isOnline, lastSeen: new Date().toISOString(), timestamp: Date.now() };
        localStorage.setItem('manaKelinha_onlineStatus_' + userId, JSON.stringify(status));
        if (firebaseReady) {
          try {
            await db.collection('online').doc(userId).set(status);
          } catch(e) {}
        }
      },

      // Lê status online do parceiro
      getOnlineStatus: async function(partnerId, callback) {
        if (firebaseReady) {
          // Listener em tempo real
          return db.collection('online').doc(partnerId).onSnapshot(doc => {
            if (doc.exists) {
              const data = doc.data();
              const isOnline = data.isOnline && (Date.now() - data.timestamp) < 45000;
              callback({ isOnline, lastSeen: data.lastSeen });
            } else {
              callback({ isOnline: false, lastSeen: null });
            }
          });
        } else {
          // Fallback localStorage (só funciona mesma aba)
          const check = () => {
            try {
              const saved = localStorage.getItem('manaKelinha_onlineStatus_' + partnerId);
              if (saved) {
                const data = JSON.parse(saved);
                const isOnline = data.isOnline && (Date.now() - data.timestamp) < 30000;
                callback({ isOnline, lastSeen: data.lastSeen });
              }
            } catch(e) {}
          };
          check();
          const interval = setInterval(check, 5000);
          return () => clearInterval(interval); // retorna unsubscribe
        }
      },

      // Listener em tempo real para sessões e userData do parceiro
      subscribePartner: function(partnerId, callback) {
        if (firebaseReady) {
          const unsubSessions = db.collection('data').doc('sessions').onSnapshot(doc => {
            if (doc.exists) {
              const data = doc.data();
              callback('sessions', data[partnerId] || []);
            }
          });
          const unsubUserData = db.collection('data').doc('userData').onSnapshot(doc => {
            if (doc.exists) {
              const data = doc.data();
              callback('userData', data[partnerId] || { xp: 0, level: 1, streak: 0, unlockedBadges: [] });
            }
          });
          return () => { unsubSessions(); unsubUserData(); };
        } else {
          // Fallback: escuta storage events (mesma máquina apenas)
          const handler = (e) => {
            if (e.key === 'manaKelinha_sessions') {
              try {
                const data = JSON.parse(e.newValue);
                callback('sessions', data[partnerId] || []);
              } catch(err) {}
            }
            if (e.key === 'manaKelinha_userData') {
              try {
                const data = JSON.parse(e.newValue);
                callback('userData', data[partnerId] || { xp: 0, level: 1, streak: 0, unlockedBadges: [] });
              } catch(err) {}
            }
          };
          window.addEventListener('storage', handler);
          return () => window.removeEventListener('storage', handler);
        }
      }
    };
  </script>

    // Calcula o número da semana atual (ISO) — reinicia toda segunda-feira
    const getWeekKey = () => {
      const now = new Date();
      const startOfYear = new Date(now.getFullYear(), 0, 1);
      const dayOfYear = Math.floor((now - startOfYear) / 86400000);
      const weekNum = Math.ceil((dayOfYear + startOfYear.getDay() + 1) / 7);
      return `${now.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
    };

    // Retorna segunda-feira e domingo da semana atual
    const getWeekRange = () => {
      const now = new Date();
      const day = now.getDay(); // 0=dom, 1=seg...
      const diffToMonday = (day === 0 ? -6 : 1 - day);
      const monday = new Date(now);
      monday.setDate(now.getDate() + diffToMonday);
      monday.setHours(0, 0, 0, 0);
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      sunday.setHours(23, 59, 59, 999);
      return { monday, sunday };
    };

      const { monday, sunday } = getWeekRange();
      return sessions.filter(s => {
        const d = new Date(s.date || s.createdAt || 0);
        return d >= monday && d <= sunday;
      });
    };

      const score = Math.round(hours * 40 + sessionCount * 10 + questions * 0.5 + accuracy * 2);

        // Helper: award badge to whoever meets threshold, or to the higher value
        const higher = (a, b) => a >= b ? me : pt;

        const meetsPt = (val, threshold) => pW[val] >= threshold ? pt : (mW[val] >= threshold ? me : null);
        const both = (myVal, ptVal, threshold) => {
          const myMeets = myVal >= threshold;
          const ptMeets = ptVal >= threshold;
          if (myMeets && ptMeets) return 'both';
          if (myMeets) return me;
          if (ptMeets) return pt;
          return null;
        };

        const badgeWinners = {};

        // Comparativos (quem tem mais)

        badgeWinners.semana_mais_sessoes = higher(mW.sessionCount, pW.sessionCount);
        badgeWinners.semana_mais_questoes = higher(mW.questions, pW.questions);
        badgeWinners.semana_melhor_acerto = higher(mW.accuracy, pW.accuracy);
        badgeWinners.semana_campeao_geral = winner;

        // Thresholds de horas — quem alcançou
        [5,10,20,30,40].forEach((h, i) => {
          const key = ['semana_5h','semana_10h','semana_20h','semana_30h','semana_40h'][i];
          const r = both(mW.hours, pW.hours, h);
          if (r) badgeWinners[key] = r;
        });

        // Thresholds de sessões
        [[3,'semana_3_sessoes'],[7,'semana_7_sessoes'],[10,'semana_10_sessoes'],[15,'semana_15_sessoes'],[20,'semana_20_sessoes']].forEach(([n,k]) => {
          const r = both(mW.sessionCount, pW.sessionCount, n);
          if (r) badgeWinners[k] = r;
        });

        // Thresholds de questões
        [[50,'semana_50_questoes'],[100,'semana_100_questoes'],[200,'semana_200_questoes'],[500,'semana_500_questoes'],[1000,'semana_1000_questoes']].forEach(([n,k]) => {
          const r = both(mW.questions, pW.questions, n);
          if (r) badgeWinners[k] = r;
        });

        // Thresholds de acerto
        [[60,'semana_acerto_60'],[75,'semana_acerto_75'],[85,'semana_acerto_85'],[95,'semana_acerto_95'],[100,'semana_acerto_100']].forEach(([n,k]) => {
          const r = both(mW.accuracy, pW.accuracy, n);
          if (r) badgeWinners[k] = r;

        // 100 respostas certas
        const myCorrect = getWeeklySessions(sessions[me] || []).reduce((a,s) => a + (s.qC||0), 0);

        // Sessão longa (3h+)
        const myLong = Math.max(0, ...getWeeklySessions(sessions[me]||[]).map(s=>(s.h||0)*60+(s.m||0)));
        const ptLong = Math.max(0, ...getWeeklySessions(sessions[pt]||[]).map(s=>(s.h||0)*60+(s.m||0)));
        if (myLong >= 180 && ptLong >= 180) { badgeWinners.semana_sessao_longa = 'both'; }
        else if (myLong >= 180) badgeWinners.semana_sessao_longa = me;
        else if (ptLong >= 180) badgeWinners.semana_sessao_longa = pt;

        // Sessão foco total (2h+)
        if (myLong >= 120 && ptLong >= 120) { badgeWinners.semana_foco_total = 'both'; }
        else if (myLong >= 120) badgeWinners.semana_foco_total = me;
        else if (ptLong >= 120) badgeWinners.semana_foco_total = pt;

        // Sessões micro
        const myMicro = getWeeklySessions(sessions[me]||[]).filter(s => { const m=(s.h||0)*60+(s.m||0); return m>=15&&m<=25; }).length;

        // Matérias diferentes na semana
        const mySubj = new Set(getWeeklySessions(sessions[me]||[]).map(s=>s.subject)).size;

          if (r) badgeWinners[k] = r;

        const myHard = getWeeklySessions(sessions[me]||[]).filter(s=>s.diff==='dificil').length;

          if (r) badgeWinners[k] = r;
        });

        else if (myEasy >= 10) badgeWinners.semana_facil_10 = me;
        else if (ptEasy >= 10) badgeWinners.semana_facil_10 = pt;

        // Semana variada (todos os tipos)
        if (myHard>0&&myMedium>0&&myEasy>0 && ptHard>0&&ptMedium>0&&ptEasy>0) badgeWinners.semana_variado = 'both';
        else if (myHard>0&&myMedium>0&&myEasy>0) badgeWinners.semana_variado = me;
        else if (ptHard>0&&ptMedium>0&&ptEasy>0) badgeWinners.semana_variado = pt;

        // Diversificada (todos os tipos)
        badgeWinners.semana_diversificada = badgeWinners.semana_variado;

        // Domínio total (ganhou em tudo)
        const myWins = [mW.hours >= pW.hours, mW.sessionCount >= pW.sessionCount, mW.questions >= pW.questions, mW.accuracy >= pW.accuracy].filter(Boolean).length;
        const ptWins = [pW.hours >= mW.hours, pW.sessionCount >= mW.sessionCount, pW.questions >= mW.questions, pW.accuracy >= mW.accuracy].filter(Boolean).length;
        if (myWins === 4) badgeWinners.semana_dominio = me;
        else if (ptWins === 4) badgeWinners.semana_dominio = pt;

        // Empate honroso
        if (Math.abs(mW.score - pW.score) < 10) badgeWinners.semana_par = 'both';

        // Casal dedicado
        if (mW.hours >= 10 && pW.hours >= 10) badgeWinners.semana_ambos_10h = 'both';
        if (mW.hours >= 20 && pW.hours >= 20) badgeWinners.semana_ambos_20h = 'both';

        // Sem faltas (7 dias) — aproximado pelos dias únicos estudados
        const myDays = new Set(getWeeklySessions(sessions[me]||[]).map(s => (s.date||s.createdAt||'').slice(0,10))).size;
        const ptDays = new Set(getWeeklySessions(sessions[pt]||[]).map(s => (s.date||s.createdAt||'').slice(0,10))).size;
        if (myDays >= 7 && ptDays >= 7) { badgeWinners.semana_todo_dia = 'both'; badgeWinners.semana_zero_faltas = 'both'; }
        else if (myDays >= 7) { badgeWinners.semana_todo_dia = me; badgeWinners.semana_zero_faltas = me; }
        else if (ptDays >= 7) { badgeWinners.semana_todo_dia = pt; badgeWinners.semana_zero_faltas = pt; }

      const partnerUnsubRef = useRef(null);

          if (type === 'userData') {

        return () => {
          clearInterval(heartbeat);

          if (typeof unsubPartner === 'function') unsubPartner();

      // Escuta evento de badges semanais concedidas

          // Para cada badge semanal, incrementa o contador do vencedor e reseta o do outro
          setUserData(prev => {
            const next = { ...prev };
            ['mana', 'kelinha'].forEach(uid => {
              const userBadges = [];
              const counts = { ...(prev[uid].weeklyBadgeCounts || {}) };
              Object.entries(champ.badges).forEach(([badgeId, winnerId]) => {
                if (winnerId === uid || winnerId === 'both') {
                  userBadges.push(badgeId);
                  counts[badgeId] = (counts[badgeId] || 0) + 1;
                }
              });
              next[uid] = {
                ...prev[uid],
                weeklyBadges: userBadges,        // reset a cada semana
                weeklyBadgeCounts: counts,        // acumula para sempre
                lastWeekKey: weekKey
              };

            return next;

        const id = Date.now() + Math.random();

        setNotifications(prev => {

          const cutoff = Date.now() - 86400000;
          let updated = [notif, ...prev.filter(n => new Date(n.time).getTime() > cutoff)];

          if (updated.length > 100) updated = updated.slice(0, 20);
          return updated;

        setNotifUnread(prev => prev + 1);

        xp += (session.qT || 0) * 2;

          duelsWon: 0,

          if (!currentBadges.includes(badge.id) && badge.condition(stats)) {

        const newTotalXP = recalcXP(remaining, finalValidBadgeIds);

              style: { flex: 1, padding: '14px', borderRadius: '14px', border: 'none', cursor: 'pointer', background: 'linear-gradient(135deg, #ef4444, #dc2626)', color: 'white', fontWeight: '700', fontSize: '14px' }
            }, '🗑️ Zerar tudo')

      const notifPanel = showNotifPanel && React.createElement(React.Fragment, null,
        React.createElement('div', { className: 'notif-panel-overlay', onClick: () => setShowNotifPanel(false) }),
        React.createElement('div', { className: 'notif-panel' },
          React.createElement('div', { className: 'notif-panel-header' },
            React.createElement('div', null,
              React.createElement('h3', { style: { fontSize: '17px', fontWeight: '800' } }, '🔔 Notificações'),
              React.createElement('p', { style: { fontSize: '12px', color: 'rgba(255,255,255,0.4)', marginTop: '2px' } },
                notifications.length === 0 ? 'Nenhuma notificação' : `${notifications.length} notificação${notifications.length > 1 ? 'ões' : ''}`
              )
            ),
            React.createElement('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } },
              notifications.length > 0 && React.createElement('button', {
                onClick: () => setNotifications([]),
                style: { background: 'none', border: '1px solid rgba(255,255,255,0.15)', borderRadius: '8px', color: 'rgba(255,255,255,0.5)', cursor: 'pointer', fontSize: '11px', padding: '5px 10px' }
              }, 'Limpar'),
              React.createElement('button', {
                onClick: () => setShowNotifPanel(false),
                style: { background: 'rgba(255,255,255,0.08)', border: 'none', borderRadius: '10px', width: '32px', height: '32px', cursor: 'pointer', color: 'white', fontSize: '18px', display: 'flex', alignItems: 'center', justifyContent: 'center' }
              }, '×')
            )
          ),
          React.createElement('div', { className: 'notif-panel-list' },
            notifications.length === 0
              ? React.createElement('div', { style: { textAlign: 'center', padding: '60px 20px', color: 'rgba(255,255,255,0.3)' } },
                  React.createElement('div', { style: { fontSize: '48px', marginBottom: '12px' } }, '🔕'),
                  React.createElement('p', { style: { fontSize: '14px' } }, 'Sem notificações ainda'),
                  React.createElement('p', { style: { fontSize: '12px', marginTop: '6px' } }, 'Conquistas e XP aparecerão aqui')
                )
              : notifications.map(n => {
                  const mins = Math.floor((new Date() - n.time) / 60000);
                  const timeLabel = mins < 1 ? 'agora' : mins < 60 ? `${mins}min` : `${Math.floor(mins/60)}h`;
                  return React.createElement('div', { key: n.id, className: `notif-item ${n.unread ? 'unread' : ''}` },
                    React.createElement('span', { className: 'notif-item-icon' }, n.icon),
                    React.createElement('div', { className: 'notif-item-body' },
                      React.createElement('p', { className: 'notif-item-msg' }, n.message),
                      n.xp > 0 && React.createElement('p', { className: 'notif-item-xp' }, `+${n.xp} XP`),
                      React.createElement('p', { className: 'notif-item-time' }, timeLabel)
                    ),
                    n.unread && React.createElement('div', { className: 'notif-unread-dot' })

                })

      return React.createElement(React.Fragment, null,
        toastContainer,
        logoutModal,

        notifPanel,
        topBar,
        sidebar,
        React.createElement('main', { className: 'content' }, mainContent),
        bottomNav

    };
    
    // Renderizar app
    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(React.createElement(App));
  </script>
